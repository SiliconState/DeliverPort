function isOnChainRail(provider) {
  return provider === 'USDC (Base)' || provider === 'USDT (Base)';
}

function paymentRailLabel(inv) {
  if (!inv) return 'Manual';
  return inv.provider || 'Manual';
}

function invoiceIsOverdue(inv) {
  if (!inv || inv.status !== 'sent' || !inv.due_at) return false;
  return Date.parse(inv.due_at) < Date.now();
}

function invoiceStatusTone(inv) {
  if (!inv) return 'draft';
  return invoiceIsOverdue(inv) ? 'overdue' : inv.status;
}

function invoiceStatusNote(inv) {
  if (!inv) return '';
  if (invoiceIsOverdue(inv)) return `Payment overdue since ${U.fmtDay(inv.due_at)}.`;
  if (inv.status === 'draft') return 'Internal draft - not visible to clients yet.';
  if (inv.status === 'sent') return inv.due_at ? `Awaiting payment by ${U.fmtDay(inv.due_at)}.` : 'Sent to client and awaiting payment.';
  if (inv.status === 'paid') return inv.paid_at ? `Paid ${U.fmtDay(inv.paid_at)}.` : 'Payment recorded.';
  return '';
}

function deliverableApprovalStatus(deliverable) {
  const raw = String(
    deliverable?.approval_status
    ?? deliverable?.approvalStatus
    ?? deliverable?.client_approval_status
    ?? deliverable?.approval?.status
    ?? (deliverable?.approved === true ? 'approved' : deliverable?.rejected === true ? 'rejected' : '')
  ).toLowerCase();
  if (['approved', 'rejected', 'pending'].includes(raw)) return raw;
  if (raw === 'approve' || raw === 'accepted') return 'approved';
  if (raw === 'reject' || raw === 'changes_requested' || raw === 'needs_changes') return 'rejected';
  return '';
}

function deliverableApprovalMeta(deliverable) {
  const status = deliverableApprovalStatus(deliverable);
  const note = String(
    deliverable?.approval_note
    ?? deliverable?.approvalNote
    ?? deliverable?.approval?.note
    ?? ''
  ).trim();
  const at = deliverable?.approved_at
    || deliverable?.approval_at
    || deliverable?.approval?.at
    || deliverable?.approval?.updated_at
    || deliverable?.approval?.created_at
    || null;
  const by = String(
    deliverable?.approval?.by
    ?? deliverable?.approval?.actor
    ?? deliverable?.approval?.actor_name
    ?? deliverable?.approved_by
    ?? ''
  ).trim();
  if (!status && !note && !at && !by) return null;
  return { status: status || 'pending', note, at, by };
}

function renderDeliverableApprovalBadge(deliverable, { showPending = false } = {}) {
  const status = deliverableApprovalStatus(deliverable);
  if (status === 'approved') return UI.statusChip('approved');
  if (status === 'rejected') return UI.statusChip('rejected');
  if (showPending && String(deliverable?.status || '') === 'delivered') return UI.statusChip('pending');
  return '';
}

function renderDeliverableApprovalNote(deliverable) {
  const approval = deliverableApprovalMeta(deliverable);
  if (!approval) return '';
  const label = approval.status === 'approved'
    ? 'Client approved'
    : approval.status === 'rejected'
      ? 'Client requested changes'
      : 'Awaiting client decision';
  const detail = [label, approval.at ? U.fmtDay(approval.at) : '', approval.by ? `by ${approval.by}` : '']
    .filter(Boolean)
    .join(' · ');
  return `<div class="text-xs mt-1" style="color:var(--ink-faint)">${U.esc(detail)}</div>${approval.note ? `<div class="text-xs mt-1" style="color:var(--ink-muted)">“${U.esc(approval.note)}”</div>` : ''}`;
}

function renderDeliverableAttachmentLinks(deliverable, { compact = false } = {}) {

  const links = attachments.map((item, idx) => {

Pages.login.mount = () => {
  const params = U.hashParams();
  const intent = params.intent === 'client' ? 'client' : 'operator';
  const allowRegister = intent !== 'client' && !APP.demo;
  const loginForm = document.getElementById('login-form');
  const registerForm = document.getElementById('register-form');
  const loginError = document.getElementById('login-error');
  const registerError = document.getElementById('register-error');
  const tabBtns = document.querySelectorAll('#login-tab-bar [data-tab]');
  const nextPath = params.redirect || '';

  const setTab = (tab) => {
    tabBtns.forEach(btn => btn.classList.toggle('btn-primary', btn.dataset.tab === tab));
    if (loginForm) loginForm.style.display = tab === 'signin' ? '' : 'none';
    if (registerForm) registerForm.style.display = tab === 'register' && allowRegister ? '' : 'none';
    if (loginError) loginError.textContent = '';
    if (registerError) registerError.textContent = '';
  };

  tabBtns.forEach(btn => btn.addEventListener('click', () => setTab(btn.dataset.tab)));

  document.querySelectorAll('[data-demo-email]').forEach(btn => btn.addEventListener('click', () => {
    loginForm?.elements.namedItem('email') && (loginForm.elements.namedItem('email').value = btn.dataset.demoEmail);
    loginForm?.elements.namedItem('password') && (loginForm.elements.namedItem('password').value = btn.dataset.demoPassword);
    setTab('signin');
  }));

  loginForm?.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginError.textContent = '';
    const submitBtn = loginForm.querySelector('[type="submit"]');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Signing in...'; }
    const fd = new FormData(loginForm);
    try {
      const user = await Auth.signIn(fd.get('email'), fd.get('password'));
      Toast.show(`Signed in as ${user.name}`);
      if (nextPath && canAccessRoute(findRoute(nextPath), user)) router.go(nextPath);
      else router.go(homePathForUser(user));
    } catch (err) { loginError.textContent = err.message || String(err); }
  });

  registerForm?.addEventListener('submit', async (e) => {
    e.preventDefault();
    registerError.textContent = '';
    const fd = new FormData(registerForm);
    try {
      const user = await Auth.register({
        name: fd.get('name'),
        email: fd.get('email'),
        password: fd.get('password'),
        wallet_address: fd.get('wallet') || '',
        role: 'operator',
      });
      Toast.show(`Workspace created - welcome, ${user.name}!`);
      router.go('#/');
    } catch (err) { registerError.textContent = err.message || String(err); }
  });
};

    const client = Clients.byId(project.client_id);

function openEditProjectModal(projectId) {
  const project = Projects.byId(projectId);
  if (!project) return;
  const deliverables = project.deliverables || [];
  const shareHref = U.href(U.setHashParams('#/share', { token: project.portal_token }), { demo: APP.demo });

  const renderAttachmentRow = (attachment = {}) => `
    <div class="grid grid-cols-[1fr_1fr_auto] gap-2 items-end" data-attachment-row>
      <input class="field" data-attachment-label value="${U.esc(attachment.label || '')}" placeholder="Label (optional)" />
      <input class="field" data-attachment-url value="${U.esc(attachment.url || '')}" placeholder="https://..." />
      <button type="button" class="btn btn-ghost text-xs" data-remove-attachment>${I.x}<span class="hidden sm:inline">Remove</span></button>
    </div>`;

  const renderDeliverableCard = (deliverable = {}, idx = 0) => {
    const attachments = Array.isArray(deliverable.attachments) ? deliverable.attachments : [];
    return `
      <div class="card-flat p-3 space-y-3" data-del-idx="${idx}">
        <input type="hidden" name="del_id_${idx}" value="${U.esc(deliverable.id || `del_${idx + 1}`)}" />
        <div class="grid grid-cols-[1fr_auto] gap-2">
          <input class="field" name="del_name_${idx}" value="${U.esc(deliverable.name || '')}" placeholder="Deliverable name" />
          <select class="field" name="del_status_${idx}" style="max-width:140px">
            <option value="pending" ${deliverable.status==='pending'?'selected':''}>Pending</option>
            <option value="in_progress" ${deliverable.status==='in_progress'?'selected':''}>In progress</option>
            <option value="delivered" ${deliverable.status==='delivered'?'selected':''}>Delivered</option>
          </select>
        </div>
        <input class="field" name="del_note_${idx}" value="${U.esc(deliverable.note || '')}" placeholder="Notes (optional)" />
        <div class="card-flat p-3 space-y-2">
          <div class="flex items-center justify-between gap-2 flex-wrap">
            <div class="text-xs uppercase tracking-wider" style="color:var(--ink-faint)">Attachment links</div>
            <button type="button" class="btn btn-ghost text-xs" data-add-attachment="${idx}">${I.plus} Add link</button>
          </div>
          <div class="space-y-2" data-attachments-for="${idx}">
            ${attachments.length ? attachments.map(att => renderAttachmentRow(att)).join('') : `<div class="text-xs" style="color:var(--ink-faint)" data-empty-attachments>No attachment links yet.</div>`}
          </div>
        </div>
      </div>`;
  };

  Modal.open('Edit project', h`
    <form id="modal-form" class="space-y-4">
      <div class="card-flat p-3 flex items-center justify-between gap-3 flex-wrap">
        <div>
          <div class="text-xs uppercase tracking-wider" style="color:var(--ink-faint)">Client portal</div>
          <div class="text-sm mt-1" style="color:var(--ink-muted)">${U.esc(shareHref)}</div>
        </div>
        <button type="button" class="btn btn-ghost" data-copy="${U.esc(location.origin + shareHref)}">${I.copy}<span>Copy link</span></button>
      </div>
      <div>
        <label class="lbl">Project name</label>
        <input class="field" name="name" required value="${U.esc(project.name)}" />
      </div>
      <div>
        <label class="lbl">Description</label>
        <textarea class="field" name="description">${U.esc(project.description || '')}</textarea>
      </div>
      <div>
        <label class="lbl">Status</label>
        <select class="field" name="status">
          ${CONFIG.projectStatuses
            .filter(s => s !== 'archived' || Plan.canArchiveProject() || project.status === 'archived')
            .map(s => `<option value="${s}" ${s === project.status ? 'selected' : ''}>${s}</option>`).join('')}
          ${!Plan.canArchiveProject() && project.status !== 'archived' ? `<option disabled style="color:var(--ink-faint)">Archived (Pro)</option>` : ''}
        </select>
      </div>
      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="lbl" style="margin-bottom:0">Deliverables</label>
          <button type="button" class="btn btn-ghost text-xs" id="add-deliverable">${I.plus} Add</button>
        </div>
        <div id="deliverables-list" class="space-y-2">
          ${deliverables.map((d, i) => renderDeliverableCard(d, i)).join('')}
        </div>
      </div>
      <div class="flex justify-end gap-2">
        <button type="button" class="btn" data-close>Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  `, {
    onMount: (root) => {
      let delCount = deliverables.length;
      const list = root.querySelector('#deliverables-list');
      const emptyAttachmentHint = `<div class="text-xs" style="color:var(--ink-faint)" data-empty-attachments>No attachment links yet.</div>`;

      const clearAttachmentHint = (container) => {
        container?.querySelector('[data-empty-attachments]')?.remove();
      };

      const ensureAttachmentHint = (container) => {
        if (!container) return;
        if (container.querySelector('[data-attachment-row]')) return;
        if (container.querySelector('[data-empty-attachments]')) return;
        container.insertAdjacentHTML('beforeend', emptyAttachmentHint);
      };

      root.querySelector('[data-copy]')?.addEventListener('click', async () => {
        await U.copyToClipboard(location.origin + shareHref);
        Toast.show('Share link copied');
      });

      root.querySelector('#add-deliverable').addEventListener('click', () => {
        const idx = delCount++;
        list.insertAdjacentHTML('beforeend', renderDeliverableCard({ id: U.uid('del'), status: 'pending', note: '', attachments: [] }, idx));
      });

      list.addEventListener('click', (event) => {
        const addBtn = event.target.closest('[data-add-attachment]');
        if (addBtn) {
          const idx = addBtn.dataset.addAttachment;
          const container = list.querySelector(`[data-attachments-for="${idx}"]`);
          if (!container) return;
          clearAttachmentHint(container);
          container.insertAdjacentHTML('beforeend', renderAttachmentRow());
          return;
        }

        const removeBtn = event.target.closest('[data-remove-attachment]');
        if (removeBtn) {
          const row = removeBtn.closest('[data-attachment-row]');
          const container = removeBtn.closest('[data-attachments-for]');
          row?.remove();
          ensureAttachmentHint(container);
        }
      });

      root.querySelector('#modal-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const existingById = new Map((deliverables || []).map(d => [String(d.id || ''), d]));
        const newDeliverables = [];
        for (let i = 0; i < delCount; i++) {
          const name = String(fd.get(`del_name_${i}`) || '').trim();
          if (!name) continue;
          const deliverableId = String(fd.get(`del_id_${i}`) || U.uid('del'));
          const previous = existingById.get(deliverableId) || null;
          const card = root.querySelector(`[data-del-idx="${i}"]`);
          const attachments = [];
          card?.querySelectorAll('[data-attachment-row]').forEach((row, attIdx) => {
            const label = String(row.querySelector('[data-attachment-label]')?.value || '').trim();
            const rawUrl = String(row.querySelector('[data-attachment-url]')?.value || '').trim();
            const url = U.safeExternalUrl(rawUrl);
            if (!url) return;
            let fallbackLabel = `Attachment ${attIdx + 1}`;
            try {
              fallbackLabel = new URL(url).hostname.replace(/^www\./, '') || fallbackLabel;
            } catch {
              // fallback stays as-is
            }
            attachments.push({ label: label || fallbackLabel, url });
          });

          const nextDeliverable = {
            ...(previous || {}),
            id: deliverableId,
            name,
            status: fd.get(`del_status_${i}`) || 'pending',
            note: fd.get(`del_note_${i}`) || '',
            attachments,
          };
          newDeliverables.push(nextDeliverable);
        }
        try {
          await Projects.update(projectId, {
            name: fd.get('name'),
            description: fd.get('description'),
            status: fd.get('status'),
            deliverables: newDeliverables,
            start_at: project.start_at,
            due_at: project.due_at,
          });
          Modal.close();
          Toast.show('Project updated');
          await router.render();
        } catch (err) { Toast.show(err.message, 'err'); }
      });
    }
  });
}

function bindOperatorWorkspaceActions() {
  const openNew = () => openNewProjectModal();
  document.getElementById('new-project-btn')?.addEventListener('click', openNew);
  document.getElementById('new-project-btn-2')?.addEventListener('click', openNew);
  document.getElementById('new-project-empty')?.addEventListener('click', openNew);
  document.querySelectorAll('[data-new-project-client]').forEach(btn => btn.addEventListener('click', () => openNewProjectModal({ client_id: btn.dataset.newProjectClient })));
  document.getElementById('new-client-btn')?.addEventListener('click', () => openClientModal());
  document.getElementById('new-client-empty')?.addEventListener('click', () => openClientModal());
  document.querySelectorAll('[data-edit-project]').forEach(btn => btn.addEventListener('click', () => openEditProjectModal(btn.dataset.editProject)));
  document.querySelectorAll('[data-edit-client]').forEach(btn => btn.addEventListener('click', () => openClientModal(btn.dataset.editClient)));
  document.querySelectorAll('[data-copy]').forEach(btn => btn.addEventListener('click', async () => {
    await U.copyToClipboard(btn.dataset.copy);
    Toast.show('Copied');
  }));
  document.getElementById('repair-btn')?.addEventListener('click', async () => {
    if (DataLayer.isApi()) { Toast.show('Repair is only available in local mode', 'err'); return; }
    try {
      const health = await DB.repair();
      Toast.show(health.ok ? 'Workspace repaired' : 'Repair ran - check health');
      await router.render();
    } catch (err) { Toast.show('Repair failed: ' + err.message, 'err'); }
  });
  document.getElementById('reset-btn')?.addEventListener('click', async () => {
    if (DataLayer.isApi()) { Toast.show('Reset is only available in local mode', 'err'); return; }
    if (!confirm(APP.demo ? 'Reset demo data for this browser?' : 'Reset the local workspace for this browser? This cannot be undone.')) return;
    try {
      await DB.hardReset({ seedDemo: APP.demo });
      Toast.show(APP.demo ? 'Demo data reset' : 'Workspace reset');
      await router.render();
    } catch (err) { Toast.show('Reset failed: ' + err.message, 'err'); }
  });
}

Pages.settings.mount = () => {
  bindOperatorWorkspaceActions();
  document.getElementById('settings-profile-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try {
      await Users.update(Store.state.authUserId, {
        name: fd.get('name'),
        email: fd.get('email'),
        wallet_address: fd.get('wallet_address'),
      });
      Toast.show('Profile updated');
      await router.render();
    } catch (err) { Toast.show(err.message, 'err'); }
  });
  document.getElementById('settings-defaults-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try {
      await Store.setDisplayCurrency(fd.get('display_currency'));
      await Store.setMeta('default_billing_currency', fd.get('default_billing_currency'));
      await Store.setMeta('default_due_days', Number(fd.get('default_due_days')) || 14);
      await Store.setMeta('default_billing_rail', fd.get('default_billing_rail'));
      Toast.show('Defaults saved');
      await router.render();
    } catch (err) { Toast.show(err.message, 'err'); }
  });
  document.getElementById('settings-upgrade')?.addEventListener('click', async () => {
    await Plan.upgrade('pro');
    Toast.show('Upgraded to Pro - unlimited projects');
    await router.render();
  });

  // Backend settings handlers
  document.getElementById('backend-url-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const url = String(fd.get('api_url') || '').trim();
    if (!url) { Toast.show('Enter an API URL', 'err'); return; }
    try {
      new URL(url); // validate URL format
    } catch { Toast.show('Invalid URL format', 'err'); return; }
    try {
      await DataLayer.setApiUrl(url);
      const check = await DataLayer.checkConnection();
      if (check.ok) {
        Toast.show('Connected to backend \u2014 reloading...');
        setTimeout(() => location.reload(), 500);
      } else {
        Toast.show('URL saved but server unreachable: ' + check.reason, 'err');
        await router.render();
      }
    } catch (err) { Toast.show('Connection failed: ' + err.message, 'err'); }
  });
  document.getElementById('backend-disconnect')?.addEventListener('click', async () => {
    await DataLayer.setApiUrl(null);
    Toast.show('Disconnected \u2014 switched to local mode');
    setTimeout(() => location.reload(), 500);
  });
  // Check connection status on load
  if (DataLayer.isApi()) {
    DataLayer.checkConnection().then(result => {
      const el = document.getElementById('backend-status');
      if (el) {
        el.textContent = result.ok ? 'Connected' : 'Unreachable: ' + result.reason;
        el.style.color = result.ok ? '#1f5d23' : 'var(--danger)';
      }
    });
  }
};

Pages.billing = async () => {
  const me = Users.current();
  if (!me || me.role !== 'operator') {
    return `<div class="max-w-4xl mx-auto p-6 md:p-10 anim-in">${UI.emptyState(I.money, 'Operator access only', 'Sign in with an operator account to manage billing.')}</div>`;
  }
  const clients = Clients.all();
  const projects = Projects.all();
  const invoices = [...Revenue.invoices()].sort((a, b) => {
    const order = { overdue: 0, sent: 1, draft: 2, paid: 3 };
    return (order[invoiceStatusTone(a)] ?? 9) - (order[invoiceStatusTone(b)] ?? 9)
      || Date.parse(a.due_at || 0) - Date.parse(b.due_at || 0)
      || Date.parse(b.issued_at || 0) - Date.parse(a.issued_at || 0);
  });
  const payoutRuns = Revenue.payoutRuns();
  const paidTotal = invoices.filter(i => i.status === 'paid').reduce((s, i) => s + Number(i.amount || 0), 0);
  const sentTotal = invoices.filter(i => i.status === 'sent').reduce((s, i) => s + Number(i.amount || 0), 0);
  const draftTotal = invoices.filter(i => i.status === 'draft').reduce((s, i) => s + Number(i.amount || 0), 0);
  const allTotal = invoices.reduce((s, i) => s + Number(i.amount || 0), 0);
  const invoiceEmptyState = !clients.length
    ? UI.emptyState(I.money, 'No invoices yet', 'Add a client first. Once clients and projects exist, your draft invoices will live here until you send them.', `<a class="btn btn-primary" href="#/clients">${I.plus}<span>Add client</span></a>`)
    : !projects.length
      ? UI.emptyState(I.money, 'No invoices yet', 'You have a client ready. Create a project so invoice history stays attached to deliverables and the client portal.', `<a class="btn btn-primary" href="#/projects">${I.plus}<span>Create project</span></a>`)
      : UI.emptyState(I.money, 'No invoices yet', 'Your workspace is ready. Start with a draft invoice, review the payment details, then mark it sent when you are ready.', `<button class="btn btn-primary" id="new-invoice-btn-empty">${I.plus}<span>Create first draft</span></button>`);

  let reminderFeed = { unsupported: !DataLayer.isApi(), reminders: [], reason: DataLayer.isApi() ? '' : 'local_mode', error: '' };
  try {
    reminderFeed = await Revenue.getReminderCandidates();
  } catch (err) {
    reminderFeed = { unsupported: false, reminders: [], reason: 'error', error: err.message || String(err) };
  }

  const invoiceById = new Map(invoices.map(inv => [inv.id, inv]));
  const seenReminderIds = new Set();
  const reminderCandidates = (Array.isArray(reminderFeed.reminders) ? reminderFeed.reminders : [])
    .map((item, idx) => {
      const inlineInvoice = item?.invoice ? normalizeInvoice(item.invoice)
        : ((item?.client_id || item?.project_id || item?.amount != null) ? normalizeInvoice(item) : null);
      const invoiceId = item?.invoice_id || item?.invoiceId || inlineInvoice?.id || item?.id || null;
      const invoice = inlineInvoice || (invoiceId ? invoiceById.get(invoiceId) : null);
      if (!invoice || seenReminderIds.has(invoice.id)) return null;
      seenReminderIds.add(invoice.id);
      const dueAt = item?.due_at || item?.dueAt || invoice.due_at || null;
      const overdueFlag = item?.is_overdue ?? item?.isOverdue ?? item?.overdue;
      const isOverdue = overdueFlag != null ? !!overdueFlag : (dueAt ? Date.parse(dueAt) < Date.now() : false);
      return {
        key: `${invoice.id}_${idx}`,
        invoice,
        dueAt,
        isOverdue,
        reason: item?.reason || item?.kind || (isOverdue ? 'Overdue reminder candidate.' : 'Due reminder candidate.'),
        lastRemindedAt: item?.last_reminded_at || item?.lastReminderAt || item?.reminded_at || null,
      };
    })
    .filter(Boolean)
    .sort((a, b) => {
      if (a.isOverdue !== b.isOverdue) return a.isOverdue ? -1 : 1;
      return Date.parse(a.dueAt || 0) - Date.parse(b.dueAt || 0);
    });

  return h`
    <div class="p-6 md:p-10 space-y-8 anim-in">
      <header class="flex items-end justify-between flex-wrap gap-4">
        <div>
          <div class="eyebrow">Revenue</div>
          <h1 class="h1">Billing + payments</h1>
          <p class="text-sm mt-3" style="color:var(--ink-muted)">Create safer invoices, keep payment instructions clear, and move drafts to sent or paid with explicit confirmation.</p>
        </div>
        <div class="flex gap-2 flex-wrap">
          <a class="btn" href="#/settings">${I.wallet}<span>Settings</span></a>
          <button class="btn btn-primary" id="new-invoice-btn">${I.plus}<span>New invoice</span></button>
        </div>
      </header>

      ${!me.wallet_address ? `<section class="card p-5">
        <div class="flex items-center justify-between gap-4 flex-wrap">
          <div>
            <div class="font-medium">Add a wallet address before sending invoices</div>
            <div class="text-sm mt-1" style="color:var(--ink-muted)">On-chain invoices need a Base wallet address so clients know where to pay.</div>
          </div>
          <a class="btn" href="#/settings">${I.wallet}<span>Open settings</span></a>
        </div>
      </section>` : ''}

      <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
        ${UI.statCard('Total invoiced', U.fmtMoney(allTotal, 'USD'), `${invoices.length} invoice${invoices.length === 1 ? '' : 's'}`)}
        ${UI.statCard('Collected', U.fmtMoney(paidTotal, 'USD'), `${invoices.filter(i => i.status === 'paid').length} paid`)}
        ${UI.statCard('Pending', U.fmtMoney(sentTotal, 'USD'), `${invoices.filter(i => i.status === 'sent').length} sent`)}
        ${UI.statCard('Drafts', U.fmtMoney(draftTotal, 'USD'), `${invoices.filter(i => i.status === 'draft').length} draft${invoices.filter(i => i.status === 'draft').length === 1 ? '' : 's'}`)}
      </section>

      <section class="card p-6 space-y-4">
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <div>
            <div class="eyebrow">Reminders</div>
            <h2 class="h2">Due + overdue follow-ups</h2>
            <div class="text-sm mt-1" style="color:var(--ink-muted)">Review reminder candidates and mark outreach events as sent.</div>
          </div>
          ${DataLayer.isApi() ? `<span class="chip chip-indigo"><span class="chip-dot"></span>API assist</span>` : `<span class="chip"><span class="chip-dot"></span>Local mode</span>`}
        </div>
        ${reminderFeed.error
          ? `<div class="text-sm" style="color:var(--danger)">Could not load reminders: ${U.esc(reminderFeed.error)}</div>`
          : reminderCandidates.length
            ? `<div class="divide-hair">${reminderCandidates.map(reminder => {
                const inv = reminder.invoice;
                const client = Clients.byId(inv.client_id);
                const project = Projects.byId(inv.project_id);
                return `
                  <div class="py-4 flex items-start justify-between gap-3 flex-wrap">
                    <div class="min-w-0 flex-1">
                      <div class="flex items-center gap-2 flex-wrap">
                        <div class="font-medium text-xs font-mono">${U.esc(inv.id)}</div>
                        ${UI.statusChip(reminder.isOverdue ? 'overdue' : 'sent')}
                        <span class="chip ${reminder.isOverdue ? 'chip-danger' : 'chip-amber'}"><span class="chip-dot"></span>${reminder.isOverdue ? 'Overdue follow-up' : 'Due soon follow-up'}</span>
                      </div>
                      <div class="text-sm mt-2" style="color:var(--ink-muted)">${U.esc(client?.name || '-')} · ${U.esc(project?.name || 'No project')}</div>
                      <div class="text-xs mt-1" style="color:var(--ink-faint)">Due ${U.esc(reminder.dueAt ? U.fmtDay(reminder.dueAt) : '-')} · ${U.esc(reminder.reason || '')}</div>
                      ${reminder.lastRemindedAt ? `<div class="text-xs mt-1" style="color:var(--ink-muted)">Last reminder: ${U.esc(U.fmtDate(reminder.lastRemindedAt))}</div>` : ''}
                    </div>
                    <div class="min-w-[170px] text-right">
                      ${!reminderFeed.unsupported
                        ? `<button class="btn btn-primary text-xs" data-inv-remind="${inv.id}">${I.export}<span>Mark reminder sent</span></button>`
                        : `<span class="text-xs" style="color:var(--ink-faint)">${U.esc(DataLayer.isApi() ? 'Upgrade backend to send reminders' : 'API mode required to send reminders')}</span>`}
                    </div>
                  </div>`;
              }).join('')}</div>`
            : `<div class="text-sm" style="color:var(--ink-muted)">No due or overdue reminder candidates right now.</div>`}
        ${reminderFeed.unsupported
          ? `<div class="text-xs" style="color:var(--ink-faint)">${U.esc(reminderFeed.reason === 'local_mode'
            ? 'Showing local reminder candidates. Connect API mode to log reminders.'
            : 'This backend does not expose /api/invoices/reminders yet. Showing fallback reminder candidates.')}</div>`
          : ''}
      </section>

      <section class="card p-6 space-y-4">
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <div>
            <div class="eyebrow">Invoices</div>
            <h2 class="h2">All invoices</h2>
            <div class="text-sm mt-1" style="color:var(--ink-muted)">Drafts stay internal until you mark them sent. Paid invoices remain here as your billing history.</div>
          </div>
          <button class="btn" id="new-invoice-btn-2">${I.plus}<span>New invoice</span></button>
        </div>
        ${invoices.length ? `
          <div class="divide-hair">
            ${invoices.map(inv => {
              const project = Projects.byId(inv.project_id);
              const client = Clients.byId(inv.client_id);
              const statusTone = invoiceStatusTone(inv);
              return `
                <div class="py-4 flex items-start justify-between gap-4 flex-wrap">
                  <div class="min-w-0 flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                      <div class="font-medium text-xs font-mono">${U.esc(inv.id)}</div>
                      ${UI.statusChip(statusTone)}
                      <span class="text-xs" style="color:var(--ink-faint)">Issued ${U.fmtDay(inv.issued_at)}</span>
                    </div>
                    <div class="text-sm mt-2" style="color:var(--ink-muted)">${U.esc(client?.name || '-')} · ${U.esc(project?.name || 'No project')}</div>
                    <div class="text-xs mt-1" style="color:var(--ink-faint)">${inv.line_items.length} line item${inv.line_items.length === 1 ? '' : 's'} · Due ${U.esc(inv.due_at ? U.fmtDay(inv.due_at) : '-')}</div>
                    <div class="text-xs mt-1" style="color:${statusTone === 'overdue' ? 'var(--danger)' : 'var(--ink-muted)'}">${U.esc(invoiceStatusNote(inv))}</div>
                    <div class="mt-3">${renderInvoicePaymentBlock(inv, { compact: true })}</div>
                  </div>
                  <div class="text-right min-w-[240px]">
                    <div class="font-mono text-lg">${U.fmtMoney(inv.amount, inv.currency || 'USD')}</div>
                    <div class="flex gap-2 flex-wrap justify-end mt-3">
                      ${renderInvoicePrimaryAction(inv)}
                      ${DataLayer.isApi() && inv.status === 'sent' && isOnChainRail(inv.provider)
                        ? `<button class="btn btn-ghost text-xs" data-inv-reconcile="${inv.id}">${I.check}<span>Reconcile on-chain</span></button>`
                        : ''}
                      ${inv.payment_address ? `<button class="btn btn-ghost text-xs" data-copy="${U.esc(inv.payment_address)}">${I.copy}<span>Copy address</span></button>` : ''}
                      ${inv.status === 'draft' ? `<button class="btn btn-ghost text-xs" data-inv-delete="${inv.id}" style="color:var(--danger)">Delete draft</button>` : ''}
                    </div>
                  </div>
                </div>`;
            }).join('')}
          </div>
        ` : invoiceEmptyState}
      </section>

      <section class="card p-6 space-y-4">
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <div>
            <div class="eyebrow">Payout runs</div>
            <h2 class="h2">Track outgoing payments</h2>
            <div class="text-sm mt-1" style="color:var(--ink-muted)">Log batched payouts to workers or vendors. Move each run from draft → queued → completed.</div>

          <button class="btn" id="new-payout-btn">${I.plus}<span>New run</span></button>

        ${payoutRuns.length ? `<div class="divide-hair">` + payoutRuns.map(run => {
          const statusNote = run.status === 'draft' ? 'Not queued yet - review before sending.'
            : run.status === 'queued' ? `Queued${run.queued_at ? ' on ' + U.fmtDay(run.queued_at) : ''} - waiting for settlement.`
            : run.status === 'completed' ? `Completed${run.completed_at ? ' on ' + U.fmtDay(run.completed_at) : ''}.`
            : '';
          const primaryAction = run.status === 'draft'
            ? `<button class="btn btn-primary text-xs" data-payout-status="${run.id}" data-next="queued">${I.export}<span>Queue for payout</span></button>`
            : run.status === 'queued'
              ? `<button class="btn btn-primary text-xs" data-payout-status="${run.id}" data-next="completed">${I.check}<span>Mark completed</span></button>`
              : `<span class="text-xs" style="color:var(--ink-muted)">${U.esc(statusNote)}</span>`;
          return `
          <div class="py-4 flex items-start justify-between gap-4 flex-wrap">
            <div class="min-w-0 flex-1">
              <div class="flex items-center gap-2 flex-wrap">
                <div class="font-medium text-xs font-mono">${U.esc(run.id)}</div>
                ${UI.statusChip(run.status)}
                <span class="text-xs" style="color:var(--ink-faint)">Created ${U.fmtDay(run.created_at)}</span>
              </div>
              <div class="text-sm mt-2" style="color:var(--ink-muted)">${U.esc(run.provider || 'Manual')} · ${U.fmtMoney(run.amount, run.currency || 'USD')} · ${(run.line_items || []).length} item${(run.line_items || []).length === 1 ? '' : 's'}</div>
              <div class="text-xs mt-1" style="color:var(--ink-muted)">${U.esc(statusNote)}</div>
            </div>
            <div class="text-right min-w-[200px]">
              <div class="font-mono text-lg">${U.fmtMoney(run.amount, run.currency || 'USD')}</div>
              <div class="flex gap-2 flex-wrap justify-end mt-3">
                ${primaryAction}
              </div>
            </div>
          </div>`;
        }).join('') + `</div>` : UI.emptyState(I.money, 'No payout runs yet', 'Use payout runs to log batched payments to workers or vendors. Each run tracks provider, amount, and settlement status.', `<button class="btn btn-primary" id="new-payout-empty">${I.plus}<span>Create first run</span></button>`)}
      </section>
    </div>
  `;
};

function openNewInvoiceModal(prefill = {}) {
  const projects = Projects.all();
  const clients = Clients.all();
  const operator = Users.auth();
  const defaults = Store.state.meta || {};
  const defaultWallet = operator?.wallet_address || '';
  const defaultCurrency = defaults.default_billing_currency || CONFIG.defaultCurrency || 'USD';
  const defaultProvider = defaults.default_billing_rail || 'USDC (Base)';
  const defaultDueDays = Number(defaults.default_due_days || 14);
  const prefillProject = prefill.projectId ? Projects.byId(prefill.projectId) : null;
  const inferredClientId = prefill.clientId || prefillProject?.client_id || (clients.length === 1 ? clients[0].id : '');
  const inferredProjectId = prefill.projectId || '';

  if (!clients.length) {
    Modal.open('Create invoice', h`

          <div class="font-medium">Add a client before you invoice</div>

        </div>
        <div class="flex justify-end gap-2">
          <button type="button" class="btn" data-close>Cancel</button>
          <a class="btn btn-primary" href="#/clients" data-close>${I.plus}<span>Go to clients</span></a>
        </div>
      </div>
    `);
    return;
  }

  Modal.open('Create invoice', h`
    <form id="modal-form" class="space-y-4">
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="lbl">Client</label>
          <select class="field" name="client_id" id="inv-client">
            <option value="">Select client...</option>
            ${clients.map(c => `<option value="${c.id}" ${c.id === inferredClientId ? 'selected' : ''}>${U.esc(c.name)}</option>`).join('')}
          </select>
          <div class="text-xs mt-1" style="color:var(--ink-muted)">Pick a client first, or choose a project and we'll match the client for you.</div>
        </div>
        <div>
          <label class="lbl">Project</label>
          <select class="field" name="project_id" id="inv-project">
            <option value="">Select project...</option>
            ${projects.map(p => `<option value="${p.id}" data-client="${p.client_id}" ${p.id === inferredProjectId ? 'selected' : ''}>${U.esc(p.name)}</option>`).join('')}
          </select>
          <div class="text-xs mt-1" id="project-help" style="color:var(--ink-muted)">Optional, but useful for portal history and shared updates.</div>
        </div>
      </div>

      <div class="grid md:grid-cols-3 gap-4">
        <div>
          <label class="lbl">Payment rail</label>
          <select class="field" name="provider" id="inv-provider">
            ${CONFIG.paymentRails.billing.map(r => `<option value="${r}" ${r === defaultProvider ? 'selected' : ''}>${r}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="lbl">Currency</label>
          <select class="field" name="currency">
            ${CONFIG.currencies.map(c => `<option value="${c.code}" ${c.code === defaultCurrency ? 'selected' : ''}>${c.code} - ${c.name}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="lbl">Due days</label>
          <input class="field" name="due_days" type="number" min="1" max="90" value="${defaultDueDays}" />
        </div>
      </div>

      <div>
        <label class="lbl" id="payment-address-label">Payment address</label>
        <input class="field font-mono" name="payment_address" id="payment-address-field" placeholder="0x..." value="${U.esc(defaultWallet)}" />
        <div class="text-xs mt-1" id="payment-address-help" style="color:var(--ink-muted)">For on-chain rails, enter a Base wallet address. For manual, describe how your client should pay.</div>
      </div>

      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="lbl" style="margin-bottom:0">Line items</label>
          <button type="button" class="btn btn-ghost text-xs" id="add-line-item">${I.plus} Add line</button>
        </div>
        <div id="line-items-list" class="space-y-2">
          <div class="card-flat p-3 grid grid-cols-[1fr_80px_80px_100px] gap-2 items-end" data-li="0">
            <div><label class="lbl">Description</label><input class="field" name="li_desc_0" placeholder="Design work" /></div>
            <div><label class="lbl">Qty</label><input class="field" name="li_qty_0" type="number" value="1" min="0" step="1" /></div>
            <div><label class="lbl">Rate</label><input class="field" name="li_rate_0" type="number" value="0" min="0" step="0.01" /></div>
            <div><label class="lbl">Amount</label><input class="field font-mono" name="li_amount_0" type="number" value="0" min="0" step="0.01" /></div>
          </div>
        </div>
      </div>

      <div class="card-flat p-4 flex items-center justify-between gap-4 flex-wrap">
        <div>
          <div class="text-xs uppercase tracking-wider" style="color:var(--ink-faint)">Invoice total</div>
          <div class="font-display text-3xl" id="invoice-total">${U.fmtMoney(0, defaultCurrency)}</div>
        </div>
        <div class="text-sm" style="color:var(--ink-muted)">Drafts stay internal until you mark them sent.</div>
      </div>

      <div>
        <label class="lbl">Notes</label>
        <textarea class="field" name="notes" placeholder="Any extra context..."></textarea>
      </div>

      <div id="invoice-status" class="text-sm" aria-live="polite" style="color:var(--ink-muted)"></div>
      <div id="invoice-error" class="text-sm" role="alert" aria-live="polite" style="color:var(--danger)"></div>
      <div class="flex justify-end gap-2">
        <button type="button" class="btn" data-close>Cancel</button>
        <button type="submit" class="btn btn-primary" id="invoice-submit">Create draft invoice</button>
      </div>
    </form>
  `, {
    onMount: (root) => {
      let liCount = 1;
      let isSubmitting = false;
      const formEl = root.querySelector('#modal-form');
      const clientEl = root.querySelector('#inv-client');
      const projectEl = root.querySelector('#inv-project');
      const providerEl = root.querySelector('#inv-provider');
      const totalEl = root.querySelector('#invoice-total');
      const errorEl = root.querySelector('#invoice-error');
      const statusEl = root.querySelector('#invoice-status');
      const currencyEl = root.querySelector('[name="currency"]');
      const labelEl = root.querySelector('#payment-address-label');
      const paymentHelpEl = root.querySelector('#payment-address-help');
      const paymentField = root.querySelector('#payment-address-field');
      const projectHelpEl = root.querySelector('#project-help');
      const submitBtn = root.querySelector('#invoice-submit');

      const getProjectOptions = () => Array.from(projectEl.querySelectorAll('option[data-client]'));
      const visibleProjectOptions = () => getProjectOptions().filter(opt => !opt.hidden && !opt.disabled);
      const selectedProjectOption = () => projectEl.selectedOptions[0]?.dataset.client ? projectEl.selectedOptions[0] : null;

      const updatePaymentLabel = () => {
        if (isOnChainRail(providerEl.value)) {
          const tokenName = providerEl.value.startsWith('USDT') ? 'USDT' : 'USDC';
          labelEl.textContent = `${tokenName} wallet address (Base)`;
          paymentField.placeholder = '0x...';
          paymentHelpEl.textContent = `Enter the Base wallet address where you want to receive ${tokenName}.`;
        } else {
          labelEl.textContent = 'Payment instructions';
          paymentField.placeholder = 'Reference, notes, or instructions for your client';
          paymentHelpEl.textContent = 'Describe how your client should pay - e.g. bank details, invoice reference, or a link.';
        }
      };

      const updateProjectOptions = () => {
        const cid = clientEl.value;
        getProjectOptions().forEach(opt => {
          const visible = !cid || opt.dataset.client === cid;
          opt.hidden = !visible;
          opt.disabled = !visible;
        });
        const selected = selectedProjectOption();
        if (selected && cid && selected.dataset.client !== cid) projectEl.value = '';
        const visible = visibleProjectOptions();
        if (!projectEl.value && cid && visible.length === 1) projectEl.value = visible[0].value;
        projectHelpEl.textContent = visible.length
          ? 'Optional, but useful for portal history and shared updates.'
          : cid
            ? 'No projects yet for this client. You can still create a client-level invoice.'
            : 'Optional, but useful for portal history and shared updates.';
      };

      const calculateTotal = () => {
        let total = 0;
        for (let i = 0; i < liCount; i++) total += Number(root.querySelector(`[name="li_amount_${i}"]`)?.value || 0);
        totalEl.textContent = U.fmtMoney(total, currencyEl.value || 'USD');
        return total;
      };

      const collectLineItems = () => {
        const fd = new FormData(formEl);
        const lineItems = [];
        for (let i = 0; i < liCount; i++) {
          const desc = String(fd.get(`li_desc_${i}`) || '').trim();
          const amount = Number(fd.get(`li_amount_${i}`)) || 0;
          if (!desc && amount <= 0) continue;
          lineItems.push({
            description: desc,
            quantity: Number(fd.get(`li_qty_${i}`)) || 1,
            rate: Number(fd.get(`li_rate_${i}`)) || 0,
            amount,
          });
        }
        return lineItems;
      };

      const updateFormState = () => {
        const total = calculateTotal();
        const lineItems = collectLineItems();
        const hasSelection = Boolean(clientEl.value || projectEl.value);
        const hasPositiveLine = lineItems.some(li => String(li.description || '').trim() && Number(li.amount || 0) > 0);
        const needsWallet = isOnChainRail(providerEl.value);
        const hasPaymentAddress = Boolean(String(paymentField.value || '').trim());
        let status = '';
        if (!hasSelection) status = 'Choose a client or project to attach this invoice.';
        else if (!hasPositiveLine || total <= 0) status = 'Add at least one line item with a description and non-zero amount.';
        else if (needsWallet && !hasPaymentAddress) status = 'Add a Base wallet address before creating this invoice.';
        else status = projectEl.value ? 'Ready to save as a draft invoice for this project.' : 'Ready to save as a draft invoice for this client.';
        statusEl.textContent = status;
        statusEl.style.color = (!hasSelection || !hasPositiveLine || total <= 0 || (needsWallet && !hasPaymentAddress)) ? 'var(--ink-muted)' : 'var(--brand)';
        submitBtn.disabled = isSubmitting || !hasSelection || !hasPositiveLine || total <= 0 || (needsWallet && !hasPaymentAddress);
        submitBtn.textContent = isSubmitting ? 'Creating...' : 'Create draft invoice';
      };

      const syncClientFromProject = () => {
        const opt = selectedProjectOption();
        if (opt?.dataset.client && clientEl.value !== opt.dataset.client) clientEl.value = opt.dataset.client;
        updateProjectOptions();
      };

      const calcAmount = (idx) => {
        const qty = Number(root.querySelector(`[name="li_qty_${idx}"]`)?.value || 0);
        const rate = Number(root.querySelector(`[name="li_rate_${idx}"]`)?.value || 0);
        const amountField = root.querySelector(`[name="li_amount_${idx}"]`);
        if (amountField) amountField.value = (qty * rate).toFixed(2);
        updateFormState();
      };

      const bindLine = (idx) => {
        root.querySelector(`[name="li_desc_${idx}"]`)?.addEventListener('input', updateFormState);
        root.querySelector(`[name="li_qty_${idx}"]`)?.addEventListener('input', () => calcAmount(idx));
        root.querySelector(`[name="li_rate_${idx}"]`)?.addEventListener('input', () => calcAmount(idx));
        root.querySelector(`[name="li_amount_${idx}"]`)?.addEventListener('input', updateFormState);
      };

      bindLine(0);
      clientEl?.addEventListener('change', () => {
        errorEl.textContent = '';
        updateProjectOptions();
        updateFormState();
      });
      projectEl?.addEventListener('change', () => {
        errorEl.textContent = '';
        syncClientFromProject();
        updateFormState();
      });
      currencyEl?.addEventListener('change', updateFormState);
      providerEl?.addEventListener('change', () => {
        updatePaymentLabel();
        updateFormState();
      });
      paymentField?.addEventListener('input', updateFormState);
      updatePaymentLabel();
      syncClientFromProject();
      updateProjectOptions();

      root.querySelector('#add-line-item').addEventListener('click', () => {
        const idx = liCount++;
        root.querySelector('#line-items-list').insertAdjacentHTML('beforeend', `
          <div class="card-flat p-3 grid grid-cols-[1fr_80px_80px_100px] gap-2 items-end" data-li="${idx}">
            <div><input class="field" name="li_desc_${idx}" placeholder="Line item" /></div>
            <div><input class="field" name="li_qty_${idx}" type="number" value="1" min="0" step="1" /></div>
            <div><input class="field" name="li_rate_${idx}" type="number" value="0" min="0" step="0.01" /></div>
            <div><input class="field font-mono" name="li_amount_${idx}" type="number" value="0" min="0" step="0.01" /></div>
          </div>`);
        bindLine(idx);
        updateFormState();
      });

      const handleSubmit = async () => {
        errorEl.textContent = '';
        updateFormState();
        if (submitBtn.disabled) return;
        const fd = new FormData(formEl);
        const lineItems = collectLineItems();
        isSubmitting = true;
        updateFormState();
        try {
          await Revenue.createInvoice({
            projectId: fd.get('project_id') || null,
            clientId: fd.get('client_id') || null,
            lineItems,
            currency: fd.get('currency') || 'USD',
            provider: fd.get('provider') || 'USDC (Base)',
            notes: fd.get('notes'),
            dueDays: Number(fd.get('due_days')) || defaultDueDays,
            paymentAddress: fd.get('payment_address'),
          });
          Modal.close();
          Toast.show('Invoice created');
          await router.render();
        } catch (err) {
          errorEl.textContent = err.message || String(err);
        } finally {
          isSubmitting = false;
          updateFormState();
        }
      };

      formEl.addEventListener('submit', async (e) => {
        e.preventDefault();
        await handleSubmit();
      });
      updateFormState();
    }
  });
}

      </div>
      <div class="flex justify-end gap-2">
        <button type="button" class="btn" data-close>Cancel</button>

      </div>

    onMount: (root) => {
      let plCount = 1;
      root.querySelector('#add-payout-line').addEventListener('click', () => {
        const idx = plCount++;
        root.querySelector('#payout-lines').insertAdjacentHTML('beforeend', `
          <div class="card-flat p-3 grid grid-cols-[1fr_120px] gap-2">
            <input class="field" name="pl_desc_${idx}" placeholder="Description" />
            <input class="field" name="pl_amount_${idx}" type="number" placeholder="Amount" value="0" min="0" step="0.01" />
          </div>`);
      });
      root.querySelector('#modal-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const lineItems = [];
        for (let i = 0; i < plCount; i++) {
          const desc = fd.get(`pl_desc_${i}`);
          if (!desc) continue;
          lineItems.push({ description: desc, amount: Number(fd.get(`pl_amount_${i}`)) || 0 });
        }
        try {
          await Revenue.createPayoutRun({
            lineItems,
            currency: fd.get('currency') || 'USD',
            provider: fd.get('provider') || 'USDC (Base)',
          });
          Modal.close();
          Toast.show('Payout run created');
          await router.render();
        } catch (err) { Toast.show(err.message, 'err'); }
      });
    }
  });
}

Pages.billing.mount = () => {
  bindOperatorWorkspaceActions();
  const openNew = () => openNewInvoiceModal();
  document.getElementById('new-invoice-btn')?.addEventListener('click', openNew);
  document.getElementById('new-invoice-btn-2')?.addEventListener('click', openNew);
  document.getElementById('new-invoice-btn-empty')?.addEventListener('click', openNew);
  document.getElementById('new-payout-btn')?.addEventListener('click', () => openNewPayoutModal());
  document.getElementById('new-payout-empty')?.addEventListener('click', () => openNewPayoutModal());

  document.querySelectorAll('[data-inv-status]').forEach(btn => btn.addEventListener('click', async () => {
    const next = btn.dataset.next;
    if (next === 'paid' && !confirm('Record payment for this invoice and mark it paid?')) return;
    if (next === 'sent' && !confirm('Mark this draft invoice as sent? It will become visible in client-facing views.')) return;
    await Revenue.setInvoiceStatus(btn.dataset.invStatus, next);
    Toast.show(next === 'paid' ? 'Invoice marked paid' : 'Invoice marked sent');
    await router.render();
  }));
  document.querySelectorAll('[data-inv-delete]').forEach(btn => btn.addEventListener('click', async () => {
    if (!confirm('Delete this draft invoice? This cannot be undone.')) return;
    await Revenue.deleteInvoice(btn.dataset.invDelete);
    Toast.show('Draft invoice deleted');
    await router.render();
  }));
  document.querySelectorAll('[data-inv-reconcile]').forEach(btn => btn.addEventListener('click', async () => {
    if (!DataLayer.isApi()) { Toast.show('Reconcile requires API mode', 'err'); return; }
    const invoiceId = btn.dataset.invReconcile;
    const original = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `${I.chart}<span>Reconciling...</span>`;
    try {
      const result = await Revenue.reconcileInvoice(invoiceId);
      if (result?.unsupported) {
        Toast.show('Reconcile endpoint is unavailable on this backend', 'err');
        return;
      }
      Toast.show('Reconciliation complete');
      await router.render();
    } catch (err) {
      Toast.show(err.message || String(err), 'err');
    } finally {
      btn.disabled = false;
      btn.innerHTML = original;
    }
  }));
  document.querySelectorAll('[data-inv-remind]').forEach(btn => btn.addEventListener('click', async () => {
    if (!DataLayer.isApi()) { Toast.show('Reminders require API mode', 'err'); return; }
    if (!confirm('Mark reminder as sent for this invoice?')) return;
    const invoiceId = btn.dataset.invRemind;
    const original = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `${I.export}<span>Saving...</span>`;
    try {
      const result = await Revenue.markReminderSent(invoiceId, { source: 'billing-ui' });
      if (result?.unsupported) {
        Toast.show('Reminder endpoint is unavailable on this backend', 'err');
        return;
      }
      Toast.show('Reminder marked sent');
      await router.render();
    } catch (err) {
      Toast.show(err.message || String(err), 'err');
    } finally {
      btn.disabled = false;
      btn.innerHTML = original;
    }
  }));
  document.querySelectorAll('[data-payout-status]').forEach(btn => btn.addEventListener('click', async () => {
    const next = btn.dataset.next;
    if (next === 'queued' && !confirm('Queue this payout run for settlement? You can still mark it completed later.')) return;
    if (next === 'completed' && !confirm('Mark this payout run as completed? This records it as fully settled.')) return;
    await Revenue.setPayoutStatus(btn.dataset.payoutStatus, next);
    Toast.show(next === 'completed' ? 'Payout run completed' : 'Payout run queued');
    await router.render();
  }));
};

Pages.portal = async () => {
  const me = Users.current();
  if (!me || me.role !== 'client') {
    return `<div class="max-w-4xl mx-auto p-6 md:p-10 anim-in">${UI.emptyState(I.export, 'Client access only', 'Sign in with a client account to view your project portal.')}</div>`;
  }
  const projects = Projects.forCurrentClient();
  const invoices = Revenue.visibleToClient(me.client_id);
  const client = Clients.byId(me.client_id);
  const paidTotal = invoices.filter(i => i.status === 'paid').reduce((s, i) => s + Number(i.amount || 0), 0);
  const outstandingInvoices = invoices.filter(i => i.status === 'sent');
  const outstandingTotal = outstandingInvoices.reduce((s, i) => s + Number(i.amount || 0), 0);

  return h`
    <div class="p-6 md:p-10 space-y-8 anim-in">
      <header class="flex items-end justify-between gap-4 flex-wrap">
        <div>
          <div class="eyebrow">Client portal</div>
          <h1 class="h1">${U.esc(client?.name || me.name)}</h1>
          <p class="text-sm mt-2 max-w-2xl" style="color:var(--ink-muted)">Track project progress, review deliverables, and handle invoices with clear payment details.</p>
        </div>
      </header>

      <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
        ${UI.statCard('Projects', U.fmtNum(projects.length))}
        ${UI.statCard('Total paid', U.fmtMoney(paidTotal, 'USD'))}
        ${UI.statCard('Outstanding', U.fmtMoney(outstandingTotal, 'USD'), `${outstandingInvoices.length} pending`)}
        ${UI.statCard('Invoices', U.fmtNum(invoices.length))}
      </section>

      ${outstandingInvoices.length ? `<section class="card p-6">
        <div class="eyebrow">Payment due</div>
        <h2 class="h2 mt-1">Outstanding invoices</h2>
        <div class="divide-hair mt-4">
          ${outstandingInvoices.map(inv => `
            <div class="py-4 flex items-start justify-between gap-4 flex-wrap">

Pages.portal.mount = () => {

    Toast.show('Copied');
  }));

      Toast.show('Approval actions require API mode', 'err');
      return;
    }
    const projectId = btn.dataset.delApprovalProject;
    const deliverableId = btn.dataset.delApprovalId;
    const decision = btn.dataset.decision;
    const noteKey = btn.dataset.noteKey;
    const noteInput = noteKey ? document.querySelector(`[data-del-approval-note="${noteKey}"]`) : null;
    const note = String(noteInput?.value || '').trim();

    btn.disabled = true;
    btn.innerHTML = `${I.chart}<span>Saving...</span>`;
    try {
      await Projects.submitDeliverableApproval(projectId, deliverableId, {
        decision,
        status: decision,
        note: note || null,
      });

      btn.innerHTML = original;

};

Pages.share = async () => {
  const params = U.hashParams();
  const token = params.token || '';
  let project = token ? Projects.portalByToken(token) : null;

  // In API mode, fetch portal data from the backend if not found locally
  if (!project && token && DataLayer.isApi()) {
    try {
      const portalData = await ApiClient.getPortal(token);
      if (portalData?.project) {
        // Inject into Store temporarily for rendering
        project = normalizeProject(portalData.project);
        if (portalData.client && !Clients.byId(portalData.client.id)) {
          Store.state.clients = [...Store.state.clients, portalData.client];
        }
        if (portalData.invoices) {
          const existingIds = new Set(Store.state.invoices.map(i => i.id));
          const newInvoices = portalData.invoices.filter(i => !existingIds.has(i.id)).map(normalizeInvoice);
          Store.state.invoices = [...Store.state.invoices, ...newInvoices];
        }
        if (!Projects.portalByToken(token)) {
          Store.state.projects = [...Store.state.projects, project];
        }
      }
    } catch (e) { console.warn('[Share] API portal fetch failed:', e.message); }
  }

  if (!project) {

Pages.share.mount = () => {
  document.querySelectorAll('[data-copy]').forEach(btn => btn.addEventListener('click', async () => {
    await U.copyToClipboard(btn.dataset.copy);
    Toast.show('Copied');
  }));

  // Wire "Pay with wallet" buttons on outstanding invoices
  document.querySelectorAll('.pay-now-btn').forEach(btn => btn.addEventListener('click', async () => {
    const amount = Number(btn.dataset.amount);
    const token = btn.dataset.token;
    const to = btn.dataset.to;
    const invoiceId = btn.dataset.invoiceId;
    const statusEl = document.querySelector(`[data-pay-status="${invoiceId}"]`);
    const showStatus = (msg, color = 'var(--ink-muted)') => {
      if (!statusEl) return;
      statusEl.classList.remove('hidden');
      statusEl.innerHTML = `<div style="color:${color}">${msg}</div>`;
    };

    btn.disabled = true;
    const origText = btn.innerHTML;
    btn.innerHTML = `<span class="spin inline-block w-4 h-4 rounded-full border-2" style="border-color:var(--brand-ink);border-top-color:transparent"></span><span>Connecting...</span>`;
    showStatus('Connecting to wallet...');

    try {
      if (!Crypto.isConnected()) await Crypto.connect();
      btn.innerHTML = `<span class="spin inline-block w-4 h-4 rounded-full border-2" style="border-color:var(--brand-ink);border-top-color:transparent"></span><span>Approve in wallet...</span>`;
      showStatus('Approve the transaction in your wallet...');

      const hash = await Crypto.sendPayment(to, amount, token);
      btn.innerHTML = `<span class="spin inline-block w-4 h-4 rounded-full border-2" style="border-color:var(--brand-ink);border-top-color:transparent"></span><span>Confirming...</span>`;
      showStatus(`Transaction sent. Waiting for confirmation...<br/><a href="${Crypto.txUrl(hash)}" target="_blank" class="underline" style="color:var(--brand)">View on BaseScan →</a>`);

      const receipt = await Crypto.waitForTx(hash);
      if (receipt.status === 'success') {
        showStatus(`✓ Payment confirmed!<br/><a href="${Crypto.txUrl(hash)}" target="_blank" class="underline" style="color:var(--brand)">View on BaseScan →</a>`, 'var(--brand)');
        btn.innerHTML = `${I.check}<span>Paid</span>`;
        btn.classList.remove('btn-primary'); btn.classList.add('btn');
        // Mark invoice as paid in local DB if possible
        try {
          await Revenue.setInvoiceStatus(invoiceId, 'paid', { provider: `${token} (Base)`, external_ref: hash });
        } catch { /* share page may not have write access */ }
      } else {
        throw new Error('Transaction reverted on-chain');
      }
    } catch (e) {
      showStatus(`Payment failed: ${U.esc(e.message || String(e))}`, 'var(--danger)');
      btn.disabled = false;
      btn.innerHTML = origText;
    }
  }));
};

const ROUTES = [
  { path: '#/landing',  page: 'landing',   label: 'Home',      icon: I.dash,   public: true,  nav: false },
  { path: '#/login',    page: 'login',     label: 'Login',     icon: I.user,   public: true,  nav: false },
  { path: '#/',         page: 'dashboard', label: 'Dashboard', icon: I.dash,   roles: ['operator'] },
  { path: '#/clients',  page: 'clients',   label: 'Clients',   icon: I.users,  roles: ['operator'] },
  { path: '#/projects', page: 'projects',  label: 'Projects',  icon: I.folder, roles: ['operator'] },
  { path: '#/billing',  page: 'billing',   label: 'Billing',   icon: I.money,  roles: ['operator'] },
  { path: '#/settings', page: 'settings',  label: 'Settings',  icon: I.wallet, roles: ['operator'] },
  { path: '#/portal',   page: 'portal',    label: 'Portal',    icon: I.folder, roles: ['client'] },
  { path: '#/share',    page: 'share',     label: 'Share',     icon: I.link,   public: true,  nav: false },
];

function routePath(hash = location.hash || '') {
  const raw = String(hash || '');
  const [path] = raw.split('?');
  return path || '#/';
}

function findRoute(hash = location.hash || '') {
  return ROUTES.find(r => r.path === routePath(hash)) || null;
}

function canAccessRoute(route, user = Users.auth()) {
  if (!route) return false;
  if (route.public) return true;
  return !!user && (!route.roles || route.roles.includes(user.role));
}

function authRedirectPath(route, { reason = 'auth', next = location.hash || '#/' } = {}) {
  const intent = route?.roles?.includes('client') ? 'client' : 'operator';
  return U.setHashParams('#/login', { intent, tab: 'signin', reason, redirect: next });
}

function visibleRoutesForRole(role) {
  if (!role) return [];
  return ROUTES.filter(route => !route.public && route.nav !== false && (!route.roles || route.roles.includes(role)));
}

          <div class="px-3 py-2 flex items-center gap-2 rounded-lg" style="background:${DataLayer.isApi() ? 'rgba(99,102,241,.1)' : 'var(--bg-sunken)'}">
            <span class="text-xs font-medium" style="color:${DataLayer.isApi() ? 'var(--brand)' : 'var(--ink-faint)'}">${DataLayer.modeLabel()}</span>
            ${DataLayer.isApi() ? `<span class="text-xs font-mono" style="color:var(--ink-faint)">${U.esc(new URL(ApiClient.baseUrl).hostname)}</span>` : ''}
          </div>
          <div class="p-3 rounded-xl" style="background:var(--bg-sunken)">
            <div class="text-xs" style="color:var(--ink-muted)">Signed in</div>
            <div class="font-medium mt-1">${U.esc(me?.name || '-')}</div>
            <div class="text-xs mt-1" style="color:var(--ink-faint)">${U.esc(me?.email || '')} · ${U.esc(me?.role || '')}</div>
            ${me?.role === 'operator'
              ? (me.wallet_address
                  ? `<div class="text-xs font-mono mt-1 break-all" style="color:var(--ink-faint)">${U.esc(me.wallet_address.slice(0,6))}...${U.esc(me.wallet_address.slice(-4))}</div>`
                  : `<div class="text-xs mt-1" style="color:var(--ink-faint)">Add a wallet address in Settings</div>`)
              : (me?.client_id
                  ? `<div class="text-xs mt-1" style="color:var(--ink-faint)">${U.esc(Clients.byId(me.client_id)?.name || 'Client account')}</div>`
                  : '')}
          </div>
        </div>
      </aside>

      <main class="main-area flex-1 min-w-0">
        <div class="sticky top-0 z-20 backdrop-blur-md border-b hairline" style="background: color-mix(in srgb, var(--bg) 85%, transparent)">
          <div class="min-h-14 px-4 md:px-6 py-2 flex items-center justify-between gap-3 flex-wrap">
            <div class="flex items-center gap-3 min-w-0">
              <button id="menu-btn" class="btn btn-ghost md:hidden" aria-label="Menu">${I.menu}</button>
              <div class="hidden md:flex items-center gap-2 text-xs" style="color:var(--ink-muted)">
                <span class="font-mono">${CONFIG.tagline}</span>
              </div>
            </div>
            <div class="flex items-center gap-2 flex-wrap justify-end">
              <select id="currency" class="field" style="max-width:110px" title="Display currency - ${U.esc(FX.sourceLabel())}">
                ${CONFIG.currencies.map(c => `
                  <option value="${c.code}" ${c.code===Store.state.displayCurrency?'selected':''}>${c.symbol} ${c.code}</option>
                `).join('')}
              </select>
              <button id="theme-btn" class="btn btn-ghost" aria-label="Theme">${Store.state.theme==='dark'?I.sun:I.moon}</button>
              <button id="logout-btn" class="btn btn-ghost">${I.user}<span class="hidden sm:inline">Sign out</span></button>
            </div>
          </div>
        </div>
        ${content}
      </main>
    </div>
  `;
}

function renderShell(content, opts = {}) {
  return opts.public ? renderPublicShell(content) : renderAppShell(content, opts);
}

const router = {
  current: '#/',
  fullHash: '#/',
  cleanup: null,
  go(path) {
    if (location.hash !== path) location.hash = path;
    else this.render();
  },
  async render() {
    if (typeof this.cleanup === 'function') {
      try { this.cleanup(); } catch (e) { console.warn('route cleanup failed', e); }
      this.cleanup = null;
    }
    let me = Users.auth();
    const desiredHash = location.hash || (me ? homePathForUser(me) : '#/landing');
    const route = findRoute(desiredHash);
    if (!route) { this.go(me ? homePathForUser(me) : '#/landing'); return; }
    if (me && authSessionExpired()) {
      await Store.clearSession();
      this.go(authRedirectPath(route, { reason: 'expired', next: desiredHash }));
      return;
    }
    if (!canAccessRoute(route, me)) {
      this.go(me ? homePathForUser(me) : authRedirectPath(route, { reason: 'auth', next: desiredHash }));
      return;
    }
    this.current = route.path;
    this.fullHash = desiredHash;
    const page = Pages[route.page];
    const content = await page();
    const app = document.getElementById('app');
    app.innerHTML = renderShell(content, { public: !!route.public, route, user: me || Users.current() });
    wireShell({ public: !!route.public, route, user: me || Users.current() });
    if (page.mount) this.cleanup = page.mount() || null;
    window.scrollTo({ top: 0, behavior: 'auto' });
  },
};

function wireShell({ public: isPublic = false } = {}) {
  if (isPublic) {
    document.getElementById('public-theme-btn')?.addEventListener('click', () => {
      const next = Store.state.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.classList.toggle('dark', next === 'dark');
      Store.setTheme(next);
    });
    return;
  }

  document.getElementById('currency')?.addEventListener('change', async e => {
    await Store.setDisplayCurrency(e.target.value);
    Toast.show('Currency → ' + e.target.value);
  });
  document.getElementById('theme-btn')?.addEventListener('click', () => {
    const next = Store.state.theme === 'dark' ? 'light' : 'dark';
    document.documentElement.classList.toggle('dark', next === 'dark');
    Store.setTheme(next);
  });
  document.getElementById('logout-btn')?.addEventListener('click', async () => {
    await Auth.signOut();
    Toast.show('Signed out');
    router.go('#/landing');
  });
  const menuBtn = document.getElementById('menu-btn');
  const sidebar = document.getElementById('sidebar');
  if (menuBtn && sidebar) menuBtn.addEventListener('click', () => sidebar.classList.toggle('open'));
  sidebar?.querySelectorAll('.navlink').forEach(a => a.addEventListener('click', () => sidebar.classList.remove('open')));
}

/* ══════════════════════════════════════ 14. BOOT ══════════════════════════════════════ */

async function boot() {
  try {
    // Initialize data layer - determines local vs API mode
    DataLayer.init();

    if (DataLayer.isApi()) {
      // API mode: restore auth from JWT, skip PGlite
      const jwt = localStorage.getItem('deliverport_jwt');
      if (jwt) {
        ApiClient.token = jwt;
      } else {
        localStorage.removeItem('deliverport_auth_user_id');
      }
      await Store.rehydrate({ preferBootstrapCache: true });

      // Infer display currency if not set
      const savedCurrency = localStorage.getItem('deliverport_display_currency');
      if (!savedCurrency) {
        const inferred = U.inferDisplayCurrency();
        if (inferred && inferred !== CONFIG.defaultCurrency) {
          await Store.setDisplayCurrency(inferred);
        }
      }
    } else {
      // Local mode: full PGlite init
      await DB.init();
      await Store.rehydrate();

      const [savedDisplayCurrency] = await DB.query(`SELECT value FROM meta WHERE key = 'display_currency'`);
      if (!savedDisplayCurrency) {
        const inferred = U.inferDisplayCurrency();
        if (inferred && inferred !== CONFIG.defaultCurrency) {
          await Store.setDisplayCurrency(inferred);
        }
      }
    }

    await FX.init();
    document.documentElement.classList.toggle('dark', Store.state.theme === 'dark');

    let chromeState = JSON.stringify({
      user: Store.state.authUserId,
      theme: Store.state.theme,
      currency: Store.state.displayCurrency,
    });
    Store.subscribe(() => {
      const next = JSON.stringify({
        user: Store.state.authUserId,
        theme: Store.state.theme,
        currency: Store.state.displayCurrency,
      });
      if (next !== chromeState) {
        chromeState = next;
        router.render();
      }
    });

    window.addEventListener('hashchange', () => router.render());
    await router.render();
    document.getElementById('boot').remove();
  } catch (err) {
    console.error(err);
    const message = err?.message || String(err);
    const recoverable = !DataLayer.isApi() && /does not exist|no such column|no such table|schema|constraint/i.test(message);
    const isApiError = DataLayer.isApi();
    document.getElementById('boot').innerHTML = `
      <div class="max-w-md text-center p-6 space-y-4">
        <div>
          <h2 class="h2 mb-2" style="color:var(--danger)">${isApiError ? 'Cannot reach the API server' : "We couldn't open your workspace"}</h2>
          <p class="text-sm mb-4" style="color:var(--ink-muted)">${U.esc(message)}</p>
          <p class="text-xs" style="color:var(--ink-faint)">${isApiError ? 'Check the API URL in your browser address bar or settings.' : 'Check the browser console for details.'}</p>
        </div>
        ${isApiError ? `
          <div class="flex gap-2 justify-center flex-wrap">
            <button class="btn" id="boot-switch-local">Switch to local mode</button>
            <button class="btn btn-primary" id="boot-retry">Retry</button>
          </div>
        ` : ''}
        ${recoverable ? `
          <div class="flex gap-2 justify-center flex-wrap">
            <button class="btn" id="boot-repair">Repair workspace</button>
            <button class="btn btn-danger" id="boot-reset">${APP.demo ? 'Reset demo data' : 'Reset local workspace'}</button>
          </div>
        ` : ''}
      </div>`;
    document.getElementById('boot-switch-local')?.addEventListener('click', async () => {
      await DataLayer.setApiUrl(null);
      location.reload();
    });
    document.getElementById('boot-retry')?.addEventListener('click', () => location.reload());
    document.getElementById('boot-repair')?.addEventListener('click', async () => {
      const bootEl = document.getElementById('boot');
      bootEl.innerHTML = '<div class="max-w-md text-center p-6 text-sm" style="color:var(--ink-muted)">Repairing...</div>';
      try {
        if (!DB.pg) { DB.pg = new PGlite(CONFIG.dbName); await DB.pg.waitReady; }
        await DB.repair();
        location.reload();
      } catch (e) {
        bootEl.innerHTML = `<div class="max-w-md text-center p-6"><h2 class="h2 mb-2" style="color:var(--danger)">Repair failed</h2><p class="text-sm" style="color:var(--ink-muted)">${U.esc(e?.message || String(e))}</p></div>`;
      }
    });
    document.getElementById('boot-reset')?.addEventListener('click', async () => {
      const bootEl = document.getElementById('boot');
      bootEl.innerHTML = '<div class="max-w-md text-center p-6 text-sm" style="color:var(--ink-muted)">Resetting...</div>';
      try {
        if (!DB.pg) { DB.pg = new PGlite(CONFIG.dbName); await DB.pg.waitReady; }
        await DB.hardReset();
        location.reload();
      } catch (e) {
        bootEl.innerHTML = `<div class="max-w-md text-center p-6"><h2 class="h2 mb-2" style="color:var(--danger)">Reset failed</h2><p class="text-sm" style="color:var(--ink-muted)">${U.esc(e?.message || String(e))}</p></div>`;
      }
    });
  }
}

boot();
</script>
